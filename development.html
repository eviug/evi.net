<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVI - Page Under Development</title>

  <style>

    .container {
        background-color: #1e3c72;
        max-width: 100%;
        width: 50%;
        max-height:100vh;
        height: 95vh;
        margin:  auto;
        /* background: rgba(4, 7, 236, 0.1);*/
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);

    }

    h1 {
      font-size: 2rem;
      
      text-align: center;
      color:#fff;
    }

    p {
      font-size: 1.5rem;
      line-height: 1.6;
      text-align: center;
    }

    .icon {
      font-size: 3rem;




    }
    .icon img{
        max-width: 100%;
        width: 18%;
        margin: auto;
        padding: 1rem 41%;

    }

    .footer {
      margin-top: 25px;
      font-size: 1rem;
      opacity: 0.8;
      color:yellow;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: white;
      color: #1e3c72;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s;
      height: 20px;
    }
.container .button {
    text-align: center;
}
    .btn:hover {
      background: #f0f0f0;
    }
 .btn{
        font-size: 1rem;
      
    }
    .footer{
        text-align: center;
        margin-top: 8.5rem;
       
    }

    @media (20rem <=width <=30rem) {
        .container{
            width: 100%;
            max-width: 100%;
        }
        p {
          font-size: 1.1rem;
          line-height: 1.5;
          color: white;
        }
        .container{
            
            max-height:100vh;
            height: 98vh;
        }
        
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="icon"><img src="img/icon/development.png"</div>

    <h1>Page Under Development</h1>

    <p>
      We are currently working on this page to improve your experience.
      Please check back later.
    </p>
  </div>

<div class="button">

    <a href="index.html" class="btn">Go Back Home</a>
</div>

    <div class="footer">
      © 2026 Enlight Vocational Institute
    </div>
  </div>

</body>
</html>
